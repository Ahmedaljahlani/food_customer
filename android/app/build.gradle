plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace 'com.inilabs.foodking'
    compileSdkVersion 35
    ndkVersion "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.inilabs.foodking"
        minSdkVersion 23
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }
    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        debug {
            ndk {
                // For debug builds, include both ARM and x86 for better emulator compatibility
                abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
            }
        }
        release {
            signingConfig signingConfigs.debug

            // Aggressive size optimization
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            crunchPngs false // Disable if using WebP

            ndk {
                // For release builds, only include ARM64 for better performance and smaller size
                abiFilters 'arm64-v8a'
            }
        }
    }

    // Disable splits since we're handling ABIs manually
    splits {
        abi {
            enable false // Disable ABI splits
        }
    }


}

flutter {
    source '../..'
}

dependencies {


    // Add these FIRST (before other dependencies if possible)
    constraints {
        implementation("androidx.window:window:1.2.0") {
            because "Fix for Android 15 compatibility"
        }
        implementation("androidx.window:window-java:1.2.0") {
            because "Fix for Android 15 compatibility"
        }
    }


    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
    implementation "com.google.firebase:firebase-messaging:23.1.1"
    implementation platform('com.google.firebase:firebase-bom:30.2.0')
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:1.2.2'
}
