  easy_stepper: ^0.8.5+1
  expandable: ^5.0.1
  expansion_tile_card: ^3.0.0
  firebase_core: ^2.27.0
#  firebase_messaging: ^14.7.19
  firebase_messaging: ^14.7.19
  flutter:
    sdk: flutter
  flutter_chat_ui: ^1.6.15
  flutter_html: ^3.0.0-beta.2
  flutter_inappwebview: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_local_notifications: ^18.0.1
  flutter_screenutil: ^5.9.3
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.10+1
  flutter_typeahead: ^5.2.0
  fluttertoast: ^8.2.5
  geocoding: ^3.0.0
  geolocator: ^11.1.0
  get_storage: ^2.1.1
  google_api_headers: ^3.5.0
#  google_fonts: ^6.2.0
  google_maps_flutter: ^2.5.3
  google_maps_flutter_ios: ^2.3.6
  im_stepper: ^1.0.1+1
  image_picker: ^1.0.8
  lottie: ^3.1.3
  map_launcher: ^3.5.0
  path_provider: ^2.1.4
  pinput: ^5.0.1
  rflutter_alert: ^2.0.7
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  timeline_tile: ^2.0.0
  toggle_switch: ^2.3.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.5.0

dev_dependencies:
  flutter_lints: ^4.0.0  # Downgrade to a version compatible with Dart 3.2.3
  flutter_test:
    sdk: flutter

flutter_icons:
  image_path: "assets/images/app_logo.png"
  android: "ic_launcher"
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animation/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
          weight: 400
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rubik-Black.ttf
          weight: 900

    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
        - asset: assets/fonts/Tajawal-ExtraLight.ttf
        - asset: assets/fonts/Tajawal-Light.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
        - asset: assets/fonts/Tajawal-Regular.ttf




